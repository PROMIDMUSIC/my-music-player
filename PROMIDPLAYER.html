<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>پلیر اختصاصی | PROMIDMUSIC</title>
    <style>
        /* ----- فونت و ریست اولیه ----- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            /* رنگ پس‌زمینه پویا (با جاوااسکریپت از روی کاور می‌گیریم) */
            transition: background-color 0.8s ease;
        }

        /* ----- کارت اصلی پلیر ----- */
        .player-card {
            background: rgba(24, 24, 24, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px 26px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* ----- هدر ----- */
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .player-header .brand {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            opacity: 0.8;
        }

        .player-header .brand span {
            color: #1db954;
        }

        .player-header .badge {
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            color: #aaa;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ----- کاور آلبوم (Artwork) با انیمیشن محو ----- */
        .artwork-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            /* نسبت 1:1 */
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 26px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            background: #1f1f1f;
        }

        .artwork-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.7s ease-in-out;
            opacity: 1;
        }
<!<img id="artworkImage" src="https://raw.githubusercontent.com/PROMIDMUSIC/my-music-player/main/PrOmid%20-%20Pause%20Hour%20.jpg" alt="Artwork">>

        .artwork-wrapper img.fade-out {
            opacity: 0;
        }

<div class="title" id="trackTitle">Pause Hour</div>
<div class="artist" id="trackArtist">PrOmid</div>
        .track-info {
            margin-bottom: 24px;
            text-align: center;
        }

        .track-info .title {
            color: #fff;
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            transition: opacity 0.4s;
        }

        .track-info .artist {
            color: #b0b0b0;
            font-size: 15px;
            font-weight: 400;
            transition: opacity 0.4s;
        }

        /* ----- نوار پیشرفت با توضیح زمان ----- */
        .progress-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
        }

        .progress-section .time {
            color: #9a9a9a;
            font-size: 12px;
            font-weight: 500;
            min-width: 38px;
            letter-spacing: 0.2px;
            font-variant-numeric: tabular-nums;
        }

        .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
        }

        .progress-track:hover {
            height: 6px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #1db954;
            border-radius: 10px;
            position: relative;
            transition: width 0.05s linear;
        }

        /* دایره‌ی اسلایدر که فقط در هاور نشان داده می‌شود */
        .progress-fill::after {
            content: '';
            position: absolute;
            left: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .progress-track:hover .progress-fill::after {
            opacity: 1;
        }

        /*<<audio id="audioPlayer" preload="metadata">
    <source src="https://raw.githubusercontent.com/PROMIDMUSIC/my-music-player/main/PrOmid%20-%20Pause%20Hour.mp3" type="audio/mpeg">
    مرورگر شما از پلیر صوتی پشتیبانی نمی‌کند.
</audio>>
<source src="https://raw.githubusercontent.com/PROMIDMUSIC/my-music-player/main/PrOmid%20-%20Pause%20Hour.mp3" type="audio/mpeg">*/
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            margin-bottom: 22px;
        }

        .controls button {
            background: none;
            border: none;
            color: #bfbfbf;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border-radius: 50%;
            width: 44px;
            height: 44px;
        }

        .controls button:hover {
            color: #fff;
            transform: scale(1.04);
            background: rgba(255, 255, 255, 0.04);
        }

        .controls .play-btn {
            background: #1db954;
            color: #000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            box-shadow: 0 8px 30px rgba(29, 185, 84, 0.35);
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .controls .play-btn:hover {
            transform: scale(1.05);
            background: #1ed760;
            box-shadow: 0 8px 40px rgba(29, 185, 84, 0.5);
        }

        .controls .play-btn.playing {
            background: #1db954;
        }

        /* انیمیشن پالس برای دکمه پخش در حالت پخش */
        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.4);
            }
            100% {
                box-shadow: 0 0 0 20px rgba(29, 185, 84, 0);
            }
        }

        .controls .play-btn.playing {
            animation: pulse-ring 1.8s infinite;
        }

        /* ----- کنترل صدا (ولوم) ----- */
        .volume-section {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .volume-section .icon {
            color: #9a9a9a;
            font-size: 17px;
        }

        .volume-track {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .volume-fill {
            height: 100%;
            width: 80%;
            background: #b0b0b0;
            border-radius: 10px;
            transition: width 0.1s;
        }

        .volume-track:hover .volume-fill {
            background: #1db954;
        }

        /* ----- فوتر با کپی‌رایت ----- */
        .footer {
            text-align: center;
            margin-top: 22px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            letter-spacing: 0.5px;
            font-weight: 400;
            user-select: none;
        }

        .footer span {
            color: rgba(255, 255, 255, 0.25);
        }

        /* ----- واکنش‌گرایی برای موبایل ----- */
        @media (max-width: 480px) {
            .player-card {
                padding: 20px 16px 22px;
                border-radius: 24px;
            }

            .track-info .title {
                font-size: 18px;
            }

            .controls {
                gap: 16px;
            }

            .controls button {
                width: 38px;
                height: 38px;
                font-size: 18px;
                padding: 4px;
            }

            .controls .play-btn {
                width: 52px;
                height: 52px;
                font-size: 26px;
            }

            .artwork-wrapper {
                border-radius: 16px;
                margin-bottom: 20px;
            }

            .player-header .brand {
                font-size: 13px;
            }
        }

        /* ----- اسکرول‌بار مخفی برای زیبایی ----- */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div class="player-card" id="playerCard">
        <!-- هدر -->
        <div class="player-header">
            <span class="brand">🎧 <span>PROMID</span>MUSIC</span>
            <span class="badge">پخش آنلاین</span>
        </div>

        <!-- کاور آلبوم -->
        <div class="artwork-wrapper" id="artworkWrapper">
            <!-- لینک عکس کاور خود را در src قرار دهید -->
            <img id="artworkImage" src="https://via.placeholder.com/600x600/1a1a1a/1db954?text=🎵+COVER" alt="Artwork">
        </div>

        <!-- اطلاعات آهنگ -->
        <div class="track-info">
            <!-- نام آهنگ را تغییر دهید -->
            <div class="title" id="trackTitle">نام آهنگ شما</div>
            <!-- نام خواننده را تغییر دهید -->
            <div class="artist" id="trackArtist">نام خواننده</div>
        </div>

        <!-- نوار پیشرفت -->
        <div class="progress-section">
            <span class="time" id="currentTime">0:00</span>
            <div class="progress-track" id="progressTrack">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time" id="totalTime">0:00</span>
        </div>

        <!-- دکمه‌های کنترل -->
        <div class="controls">
            <button id="prevBtn" aria-label="قبلی" title="۱۰ ثانیه قبل">⏮</button>
            <button class="play-btn" id="playBtn" aria-label="پخش یا توقف">▶</button>
            <button id="nextBtn" aria-label="بعدی" title="۱۰ ثانیه بعد">⏭</button>
        </div>

        <!-- کنترل صدا -->
        <div class="volume-section">
            <span class="icon">🔊</span>
            <div class="volume-track" id="volumeTrack">
                <div class="volume-fill" id="volumeFill"></div>
            </div>
        </div>

        <!-- فوتر با کپی‌رایت -->
        <div class="footer">
            <span>© 2026 PROMIDMUSIC — تمامی حقوق محفوظ است</span>
        </div>
    </div>

    <!-- المنت صوتی مخفی -->
    <audio id="audioPlayer" preload="metadata">
        <!-- لینک مستقیم فایل صوتی خود را در src قرار دهید -->
        <source src="https://raw.githubusercontent.com/your-username/your-repo/main/music.mp3" type="audio/mpeg">
        مرورگر شما از پلیر صوتی پشتیبانی نمی‌کند.
    </audio>

    <script>
        // =================================================
        //  اسکریپت کامل پلیر با قابلیت‌های پیشرفته
        // =================================================

        // ----- عناصر DOM -----
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const progressTrack = document.getElementById('progressTrack');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeFill = document.getElementById('volumeFill');
        const volumeTrack = document.getElementById('volumeTrack');
        const artworkImg = document.getElementById('artworkImage');
        const playerCard = document.getElementById('playerCard');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');

        // =============================================
        //  ۱. کنترل پخش و توقف
        // =============================================
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
            } else {
                audio.pause();
                playBtn.textContent = '▶';
                playBtn.classList.remove('playing');
            }
        }

        playBtn.addEventListener('click', togglePlay);

        // پشتیبانی از دکمه Space (فاصله) برای پخش/توقف
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                e.preventDefault();
                togglePlay();
            }
        });

        // =============================================
        //  ۲. مدیریت زمان و نوار پیشرفت
        // =============================================
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return '0:00';
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        }

        // آپدیت پیشرفت هنگام پخش
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100 || 0;
            progressFill.style.width = Math.min(percent, 100) + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        // نمایش زمان کل بعد از لود متادیتا
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        // کلیک روی نوار پیشرفت برای تغییر زمان
        progressTrack.addEventListener('click', (e) => {
            const rect = progressTrack.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            audio.currentTime = percent * audio.duration;
        });

        // =============================================
        //  ۳. دکمه‌های جلو و عقب (۱۰ ثانیه)
        // =============================================
        document.getElementById('prevBtn').addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });

        // =============================================
        //  ۴. کنترل صدا (ولوم)
        // =============================================
        // تنظیم ولوم پیش‌فرض روی ۸۰٪
        audio.volume = 0.8;
        volumeFill.style.width = '80%';

        volumeTrack.addEventListener('click', (e) => {
            const rect = volumeTrack.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            audio.volume = percent;
            volumeFill.style.width = (percent * 100) + '%';
        });

        // =============================================
        //  ۵. تغییر رنگ پس‌زمینه بر اساس کاور (Adaptive)
        // =============================================
        function extractDominantColor(imageElement) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 20;
            canvas.height = 20;
            ctx.drawImage(imageElement, 0, 0, 20, 20);
            const imageData = ctx.getImageData(0, 0, 20, 20).data;
            let r = 0,
                g = 0,
                b = 0,
                count = 0;
            for (let i = 0; i < imageData.length; i += 4) {
                r += imageData[i];
                g += imageData[i + 1];
                b += imageData[i + 2];
                count++;
            }
            r = Math.floor(r / count);
            g = Math.floor(g / count);
            b = Math.floor(b / count);
            return `rgb(${r}, ${g}, ${b})`;
        }

        // وقتی عکس کاور لود شد، رنگ پس‌زمینه را تغییر بده
        artworkImg.addEventListener('load', function() {
            try {
                const color = extractDominantColor(this);
                document.body.style.backgroundColor = color;
                // برای زیبایی، یک سایه تیره روی کارت می‌اندازیم
                playerCard.style.boxShadow = `0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04)`;
            } catch (e) {
                console.log('⚠️ استخراج رنگ با مشکل مواجه شد، از رنگ پیش‌فرض استفاده می‌شود.');
            }
        });

        // اگر عکس از قبل کش شده بود، رویداد load ممکن است اجرا نشود
        if (artworkImg.complete) {
            artworkImg.dispatchEvent(new Event('load'));
        }

        // =============================================
        //  ۶. مدیریت خطاها و نمایش پیام
        // =============================================
        audio.addEventListener('error', (e) => {
            console.warn('⚠️ خطا در پخش فایل صوتی:', e);
            alert('❌ خطا: لینک فایل صوتی صحیح نیست.\nلطفاً آن را در کد HTML اصلاح کنید.');
        });

        // =============================================
        //  ۷. تنظیمات اولیه پس از لود صفحه
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            // اگر فایل صوتی مدت‌دار بود، اطلاعات را نشان بده
            if (audio.readyState >= 2) {
                totalTimeEl.textContent = formatTime(audio.duration);
            }
            console.log('🎵 پلیر اختصاصی PROMIDMUSIC با موفقیت راه‌اندازی شد!');
        });

        // به‌روزرسانی عنوان صفحه با نام آهنگ (اختیاری)
        // می‌توانید مقادیر زیر را با نام واقعی آهنگ و خواننده جایگزین کنید
        // trackTitle.textContent = 'نام واقعی آهنگ';
        // trackArtist.textContent = 'نام واقعی خواننده';
        // document.title = `🎵 ${trackTitle.textContent} - ${trackArtist.textContent}`;
    </script>

</body>
